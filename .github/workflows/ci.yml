name: CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.8', '3.9', '3.10', '3.11' ]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        cd backend
        pip install -r requirements.txt
    
    - name: Check syntax
      run: |
        cd backend
        python -m py_compile main.py

  frontend-lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Verify frontend project structure
      run: |
        echo "=== Frontend Files ===" && ls -la frontend/
        echo "" && echo "=== Package.json Contents ===" && cat frontend/package.json
        echo "" && echo "=== Checking required files ===" && \
        test -f frontend/package.json && echo "✓ package.json found" || echo "✗ package.json missing" && \
        test -f frontend/src/App.jsx && echo "✓ App.jsx found" || echo "✗ App.jsx missing" && \
        test -f frontend/index.html && echo "✓ index.html found" || echo "✗ index.html missing"
